name: MindReply – Full CI/CD (Vercel Primary + GHCR + VPS + Azure + IONOS + QA)

on:
  push:
    branches:
      - main

jobs:

  # ---------------------------------------------------------
  # 1) BUILD JOB + NODE/NPM CACHE
  # ---------------------------------------------------------
  build:
    name: Build app
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json', 'npm-shrinkwrap.json', 'pnpm-lock.yaml', 'yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - run: npm install
      - run: npm run build

  # ---------------------------------------------------------
  # 2) DOCKER → GHCR + LAYER CACHE
  # ---------------------------------------------------------
  docker_ghcr:
    name: Docker build & push to GHCR
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/mind-reply/mindreply:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move new cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  # ---------------------------------------------------------
  # 3) VPS DEPLOY (ZERO-DOWNTIME)
  # ---------------------------------------------------------
  deploy_vps:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: docker_ghcr

    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker pull ghcr.io/mind-reply/mindreply:latest
            docker run -d --name mindreply_new -p 3001:3000 ghcr.io/mind-reply/mindreply:latest
            sleep 5
            docker stop mindreply || true
            docker rm mindreply || true
            docker rename mindreply_new mindreply

  # ---------------------------------------------------------
  # 4) VERCEL DEPLOY (PRIMARY)
  # ---------------------------------------------------------
  deploy_vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v3

      - name: Cache Vercel build artifacts
        uses: actions/cache@v4
        with:
          path: .vercel
          key: ${{ runner.os }}-vercel-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-vercel-

      - run: |
          npm i -g vercel
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  # ---------------------------------------------------------
  # 5) DOMAIN HEALTH CHECK
  # ---------------------------------------------------------
  ping_pro_domain:
    name: Check pro.mind-reply.com
    runs-on: ubuntu-latest
    needs: deploy_vercel

    steps:
      - run: curl -I https://pro.mind-reply.com || exit 1

  # ---------------------------------------------------------
  # 6) AZURE DEPLOY
  # ---------------------------------------------------------
  deploy_azure:
    name: Deploy to Azure App Service
    runs-on: ubuntu-latest
    needs: build
    if: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE != '' }}

    steps:
      - uses: actions/checkout@v3
      - uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .

  # ---------------------------------------------------------
  # 7) IONOS DEPLOY NOW SYNC
  # ---------------------------------------------------------
  ionos_sync:
    name: Sync to IONOS Deploy Now
    runs-on: ubuntu-latest
    needs: build
    if: ${{ secrets.IONOS_TOKEN != '' }}

    steps:
      - run: echo "Triggering IONOS Deploy Now webhook"
      - run: curl -X POST ${{ secrets.IONOS_WEBHOOK }}

  # ---------------------------------------------------------
  # 8) LIGHTHOUSE PERFORMANCE TEST
  # ---------------------------------------------------------
  lighthouse:
    name: Lighthouse Performance Audit
    runs-on: ubuntu-latest
    needs: deploy_vercel

    steps:
      - uses: actions/checkout@v3
      - uses: treosh/lighthouse-ci-action@v10
        with:
          urls: https://pro.mind-reply.com

  # ---------------------------------------------------------
  # 9) SEO ANALYSIS
  # ---------------------------------------------------------
  seo_audit:
    name: SEO Audit
    runs-on: ubuntu-latest
    needs: deploy_vercel

    steps:
      - run: npx @stefanjudis/seo-audit https://pro.mind-reply.com

  # ---------------------------------------------------------
  # 10) SCREENSHOT CAPTURE
  # ---------------------------------------------------------
  screenshot:
    name: Screenshot of Production
    runs-on: ubuntu-latest
    needs: deploy_vercel

    steps:
      - uses: swinton/screenshot-website@v1.x
        with:
          source: https://pro.mind-reply.com
          destination: screenshot.png

  # ---------------------------------------------------------
  # 11) VPS BACKUP
  # ---------------------------------------------------------
  backup_vps:
    name: Backup VPS
    runs-on: ubuntu-latest
    needs: deploy_vps

    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            tar -czf backup_$(date +%F).tar.gz /var/www || true

  # ---------------------------------------------------------
  # 12) VERSION BUMP
  # ---------------------------------------------------------
  version_bump:
    name: Auto Version Bump
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v3
      - run: |
          npm version patch
          git push --follow-tags

  # ---------------------------------------------------------
  # 13) NOTIFICATIONS
  # ---------------------------------------------------------
  notify:
    name: Notify Slack/Discord
    runs-on: ubuntu-latest
    needs: [deploy_vercel, deploy_vps]

    steps:
      - run: |
          curl -X POST -H "Content-Type: application/json" \
          -d '{"text":"MindReply deployed successfully 🚀"}' \
          ${{ secrets.DISCORD_WEBHOOK }}
