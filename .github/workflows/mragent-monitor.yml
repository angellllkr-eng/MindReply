name: MRagent Monitor

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Write short production report
        env:
          MRAGENT_REPORT_JSON: mragent-monitor-status.json
        run: node scripts/mragent-monitor-report.mjs >> "$GITHUB_STEP_SUMMARY"

      - name: Write growth pulse
        env:
          MRAGENT_GROWTH_PULSE_JSON: mragent-growth-pulse.json
        run: |
          echo "" >> "$GITHUB_STEP_SUMMARY"
          node scripts/mragent-growth-pulse.mjs >> "$GITHUB_STEP_SUMMARY"

      - name: Write tiny digest
        env:
          MRAGENT_REPORT_JSON: mragent-monitor-status.json
          MRAGENT_GROWTH_PULSE_JSON: mragent-growth-pulse.json
          MRAGENT_SHORT_DIGEST_JSON: mragent-short-digest.json
          MRAGENT_SHORT_DIGEST_MD: mragent-short-digest.md
        run: |
          echo "" >> "$GITHUB_STEP_SUMMARY"
          node scripts/mragent-short-digest.mjs >> "$GITHUB_STEP_SUMMARY"

      - name: Upload machine-readable status
        uses: actions/upload-artifact@v4
        with:
          name: mragent-monitor-status
          path: |
            mragent-monitor-status.json
            mragent-growth-pulse.json
            mragent-short-digest.json
            mragent-short-digest.md
          if-no-files-found: error
