name: Decision Layer CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        run: npm install

      - name: Verify decision layer
        run: npm run decision:verify

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Python backend tests
        run: python -m unittest discover src
