name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Verify MRagent behavior
        run: npm run agent:verify

      - name: Verify agent execution queue
        run: npm run agents:queue:verify

      - name: Verify marketing events
        run: npm run marketing:verify

      - name: Verify payment delivery
        run: npm run payments:verify

      - name: Verify Message Rescue offer
        run: npm run rescue:verify

      - name: Verify language routing
        run: npm run language:verify

      - name: Verify ops overload analyzer
        run: npm run ops:verify

      - name: Verify prospect reply analyzer
        run: npm run prospect:verify

      - name: Verify AI provider readiness
        run: npm run ai:verify

      - name: Build
        run: npm run build
