opinion: >-
  MRagent is usable through the public agent page and fallback intake route, but the
  production domain is not yet serving the newer ChatGPT app/MCP/version surfaces.
  While Vercel is rate-limited, useful work should be written to the mind-reply
  storage branch or GitHub Actions artifacts unless it must change the live app.
next_actions:
  - Clear or wait out Vercel build-rate-limit before pushing app-changing main commits.
  - Keep reporting-only and branch-cleanup material on mind-reply storage when possible.
  - After Vercel quota clears, push a main app commit that makes /api/agent, /api/version, and /mcp live on the public domain.
  - Then run browser capture for /agent and verify the warm Mind Read flow end to end.
