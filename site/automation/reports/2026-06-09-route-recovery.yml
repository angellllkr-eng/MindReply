recovery_plan_when_quota_clears:
  - Trigger or wait for a successful active Vercel mind-reply deployment from main.
  - Use /api/version to prove the public domain commit equals latest main.
  - Re-probe /api/agent, /api/version, /manifest.webmanifest, /opengraph-image, /mcp, and /api/mcp.
  - If routes are still stale after a successful deploy, inspect Vercel domain assignment and middleware rewrites.
  - Only then start paid ads or ChatGPT Developer Mode connection testing.
short_digest_line: Main already has the missing route files; production is stale because Vercel is build-rate-limited.
opinion: >-
  This is not a coding gap today. The correct move is to preserve reporting and growth work on
  mind-reply storage, avoid noisy main commits, and use /api/version as the proof gate as soon as
  Vercel can build again.
