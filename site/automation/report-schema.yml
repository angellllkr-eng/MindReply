artifact: mragent-monitor-status
file: mragent-monitor-status.json
producer: scripts/mragent-monitor-report.mjs
workflow: .github/workflows/mragent-monitor.yml
verification_workflow: .github/workflows/mragent-verify.yml
preview_capture_workflow: .github/workflows/mragent-preview-capture.yml
preview_capture_script: scripts/mragent-preview-capture.mjs
growth_pulse:
  artifact: mragent-growth-pulse
  file: mragent-growth-pulse.json
  producer: scripts/mragent-growth-pulse.mjs
  workflow: .github/workflows/mragent-growth-pulse.yml
  cadence: weekly monday and manual workflow_dispatch
  purpose: Summarize active promise, search lane, ad tests, copy alignment, preview state, and next visibility task.
cadence: every 15 minutes and manual workflow_dispatch
purpose: Give humans and future personal-pack automation the same compact state snapshot.
fields:
  generatedAt: ISO timestamp for the monitor run.
  siteUrl: Production or override URL checked by the run.
  run:
    repository: GitHub owner/repo for the run.
    ref: Full Git ref or local fallback.
    branch: Branch name or local fallback.
    sha: Commit SHA or local fallback.
    runId: GitHub Actions run id or local fallback.
    runAttempt: GitHub Actions attempt number or local fallback.
    runUrl: GitHub Actions run URL when available.
  commitStatus:
    state: Combined GitHub commit status state, or local/error fallback.
    signal: Short status signal, prioritizing the active Vercel context when present.
    deployment:
      primary: Active Vercel status context, prioritizing mind-reply.
      legacy: Legacy Vercel context, usually mindreply when present.
      quotaLimited: Vercel context whose target URL indicates build-rate-limit or upgradeToPro.
      all: All Vercel status contexts seen on the commit.
    statuses: Individual commit status contexts with state, target URL, and description.
  productionVersion:
    liveSha: Commit SHA reported by /api/version on the checked site.
    expectedSha: GitHub Actions SHA for the monitor run when available.
    matchesRun: true, false, or null when unavailable.
    data: Full /api/version JSON payload.
  functionalChecks:
    agentApi:
      ok: true when /api/agent returns reply, receipt, risk, and one action.
      signal: Short outcome for the preferred API.
    intakeApi:
      ok: true when /api/intake returns synthesis, receipt, risk, and one action.
      signal: Short outcome for the fallback decision route.
    decisionApi: live when either preferred or fallback decision route works.
  summary:
    coreAgent: live or check.
    decisionApi: live or not live.
    preferredAgentApi: live or not live.
    fallbackIntakeApi: live or not live.
    mcpApp: live or not live.
    health: live or not live.
    version: live or not live.
    discoveryAssets: live or not live.
    personalPack: ready or check.
    currentBlocker: Current deploy, stale production, API, or platform blocker in plain language.
    opinion: Short operating opinion for the pass.
    nextAction: The next recommended move.
  surfaces: Per-URL status, method, latency, signal, and JSON data when available, including agent-api, intake-api, version, primary_mcp, and fallback_mcp checks.
  packSources: Required personal-pack source files and whether each exists, including slack-api, vercel-build-limit, verification-runbook, preview-capture-script, preview-capture-workflow, visibility-plan, search-intents, live-copy-sync, preview-qa, preview-results, and ad-copy-tests.
connection_urls:
  agent: https://www.mind-reply.com/agent
  preferred_agent_api: https://www.mind-reply.com/api/agent
  fallback_intake_api: https://www.mind-reply.com/api/intake
  version: https://www.mind-reply.com/api/version
  primary_mcp: https://www.mind-reply.com/mcp
  fallback_mcp: https://www.mind-reply.com/api/mcp
visibility:
  plan: site/growth/visibility-plan.yml
  positioning: site/growth/positioning.yml
  search_intents: site/growth/search-intents.yml
  live_copy_sync: site/growth/live-copy-sync.yml
  preview_qa: site/growth/preview-qa.yml
  preview_results: site/growth/preview-results.yml
  growth_pulse: scripts/mragent-growth-pulse.mjs
  preview_capture:
    monitor_labels:
      - preview-capture-script
      - preview-capture-workflow
    workflow: .github/workflows/mragent-preview-capture.yml
    script: scripts/mragent-preview-capture.mjs
    artifacts:
      - mragent-preview-results/agent-desktop.png
      - mragent-preview-results/agent-mobile.png
      - mragent-preview-results/preview-results.json
  ads: site/ads/messaging.yml
  ad_copy_tests: site/ads/copy-tests.yml
  report_fields:
    - active_deployment
    - legacy_quota_context
    - production_version
    - functional_api_checks
    - growth_pulse
    - production_surfaces
    - search_assets
    - ad_message_sync
    - next_visibility_task
verification:
  runbook: site/automation/verification-runbook.yml
  commands:
    - node scripts/vercel-ignore-build.mjs --self-test
    - npm run decision:verify
    - npm run mcp:verify
    - npm run typecheck
    - npm run build
  rule: Verification runs in GitHub Actions and is separate from Vercel publishing.
slack_handoff:
  config: site/automation/slack-api.yml
  field_id: Xf0B6WHC2SBH
  rule: Use only after Slack connector access and a destination channel or DM are available.
vercel_handoff:
  runbook: site/automation/vercel-build-limit-runbook.yml
  rule: Treat upgradeToPro=build-rate-limit as account quota until build logs prove a code failure.
uses:
  - GitHub Actions summary
  - future Slack report handoff after workspace channel is connected
  - future Outlook digest handoff after mailbox target is named
  - personal pack status checks
  - manual preview capture artifacts from MRagent Preview Capture
  - weekly growth pulse artifact for SEO and ad message alignment
